name: deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: deploy to Amplify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Zip the app folder
        run: |
          cd app
          zip -r ../deploy.zip .
          ls -lh ../deploy.zip

      - name: Create Amplify deployment
        id: create
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          response=$(aws amplify create-deployment \
            --app-id "$APP_ID" \
            --branch-name main)
          job_id=$(echo "$response" | jq -r '.jobId')
          upload_url=$(echo "$response" | jq -r '.zipUploadUrl')
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
          echo "upload_url=$upload_url" >> "$GITHUB_OUTPUT"

      - name: Upload zip to S3 (presigned URL)
        run: |
          curl --fail -X PUT \
            -H "Content-Type: application/zip" \
            --upload-file deploy.zip \
            "${{ steps.create.outputs.upload_url }}"

      - name: Start Amplify deployment
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          JOB_ID: ${{ steps.create.outputs.job_id }}
        run: |
          aws amplify start-deployment \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-id "$JOB_ID"

      - name: Wait for deployment to finish
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          JOB_ID: ${{ steps.create.outputs.job_id }}
        run: |
          for i in {1..60}; do
            status=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name main \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' --output text)
            echo "attempt $i: status=$status"
            case "$status" in
              SUCCEED) echo "deploy succeeded"; exit 0 ;;
              FAILED|CANCELLED) echo "deploy $status"; exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "timed out waiting for deployment"
          exit 1
